spring.application.name=system-ventas

# Configuración de la Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ventas_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SOLUCIÓN AL ERROR: 'create' borra la DB dañada y la vuelve a crear perfecta al iniciar
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8081